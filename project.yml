name: Farnsworth
options:
  bundleIdPrefix: com.example
packages:
  swift-atomics:
    url: https://github.com/apple/swift-atomics.git
    from: 1.2.0
targets:
  Farnsworth:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Audio
      - path: Models
      - path: Store
      - path: Views
      - path: FarnsworthApp.swift
    dependencies:
      - package: swift-atomics
        product: Atomics
    infoPlist:
      NSAppTransportSecurity:
        NSAllowsArbitraryLoads: false
    postBuildScripts:
      - script: |
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
        name: SwiftLint
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      PRODUCT_BUNDLE_IDENTIFIER: com.example.Farnsworth
  FarnsworthTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources: [Tests/FarnsworthTests]
    dependencies:
      - target: Farnsworth
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.example.FarnsworthTests
