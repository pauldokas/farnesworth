name: Farnsworth
options:
  bundleIdPrefix: com.example
targets:
  Farnsworth:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - "AGENTS.md"
          - ".sisyphus"
          - "boulder.json"
          - "Package.swift"
          - "project.yml"
          - "Farnsworth.xcodeproj"
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      PRODUCT_BUNDLE_IDENTIFIER: com.example.Farnsworth
